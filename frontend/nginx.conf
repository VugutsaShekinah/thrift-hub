server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Same pattern as the Vite dev proxy (vite.config.js): same-origin /api
    # and /media so the httpOnly refresh cookie needs no cross-origin setup.
    # "backend" resolves via Docker Compose's internal DNS.
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /media/ {
        proxy_pass http://backend:8000/media/;
    }

    # SPA routing — let React Router handle unknown paths client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
