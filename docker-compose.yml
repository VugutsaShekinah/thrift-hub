services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-thrifthub}
      POSTGRES_USER: ${DB_USER:-thrifthub}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-thrifthub}
    volumes:
      - thrifthub_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-thrifthub}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - thrifthub_media:/app/media
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  thrifthub_pgdata:
  thrifthub_media:
